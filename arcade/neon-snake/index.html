<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description"
    content="Neon Snake — classic snake reimagined with neon visuals and glowing effects. Play free in your browser.">
  <title>Neon Snake — AI Lab Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Shared animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="orb orb--1" aria-hidden="true"></div>
  <div class="orb orb--2" aria-hidden="true"></div>

  <div class="game-page">

    <header class="arcade-header">
      <a href="../" class="back-link" id="back-link">← Back to Arcade</a>
      <h1 class="arcade-header__title arcade-header__title--gradient title-ns">Neon Snake</h1>
    </header>

    <!-- HUD -->
    <div class="hud">
      <span class="hud__score" id="hud-score">Score: 0</span>
      <span class="hud__high" id="hud-high">Best: 0</span>
    </div>

    <!-- Canvas + Overlays -->
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="game-canvas"></canvas>

      <!-- Start Overlay -->
      <div class="overlay overlay--visible" id="overlay-start">
        <div class="overlay__bg"></div>
        <div class="overlay__content">
          <h1 class="overlay__title">Neon Snake</h1>
          <div class="overlay__snake-art">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <p class="overlay__prompt">Press any key or tap to start</p>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div class="overlay overlay--hidden" id="overlay-gameover">
        <div class="overlay__bg"></div>
        <div class="overlay__content">
          <h2 class="overlay__title">Game Over</h2>
          <p class="overlay__final-label">Score</p>
          <div class="overlay__final-score" id="final-score">0</div>
          <div class="overlay__high-score" id="final-high">Best: 0</div>
          <div class="overlay__new-best overlay--hidden" id="new-best" style="display:none">★ New Best! ★</div>
          <p class="overlay__prompt">Press any key or tap to play again</p>
        </div>
      </div>
    </div>

    <!-- Mobile D-pad -->
    <div class="mobile-controls" id="mobile-controls">
      <div class="mobile-controls__row">
        <div class="mobile-btn mobile-btn--spacer"></div>
        <button class="mobile-btn" data-dir="up" aria-label="Up">▲</button>
        <div class="mobile-btn mobile-btn--spacer"></div>
      </div>
      <div class="mobile-controls__row">
        <button class="mobile-btn" data-dir="left" aria-label="Left">◀</button>
        <button class="mobile-btn" data-dir="down" aria-label="Down">▼</button>
        <button class="mobile-btn" data-dir="right" aria-label="Right">▶</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>

</body>

</html>
